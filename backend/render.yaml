services:
  - type: web
    name: afrikcse-afrikvoyage-api
    runtime: node
    region: frankfurt
    plan: free

    buildCommand: npm install && npx prisma generate --early-access && npm run build

    # Migration + démarrage séparés avec les bons flags
    startCommand: npx prisma migrate deploy --early-access && node dist/server.js

    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: afrikcse-afrikvoyage-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: PORT
        value: 10000

databases:
  - name: afrikcse-afrikvoyage-db
    databaseName: afrikcse_afrikvoyage
    user: afrikcse_user
    region: frankfurt
    plan: free